<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Городской Транспорт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121922;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .screen { display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }
        
        /* Экран 1: Цифровая клавиатура */
        .code-boxes { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .box { width: 45px; height: 55px; border: 1px solid #2d3846; border-radius: 6px; background: #1a2431; text-align: center; font-size: 24px; line-height: 55px; font-weight: bold; }
        .hint { text-align: center; margin-top: 50px; color: #a0acba; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .keyboard { position: fixed; bottom: 20px; left: 0; right: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 16px; }
        .key { background: #ffffff; color: #121922; border: none; padding: 20px; font-size: 24px; font-weight: 500; border-radius: 6px; text-align: center; cursor: pointer; active { background: #e0e0e0; } }
        .key-special { background: #1a2431; color: #a0acba; font-size: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Экран 2: Ввод данных автобуса (Конструктор) */
        .title { font-size: 20px; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #212d3d; }
        .field-group { border-bottom: 1px solid #212d3d; padding: 12px 0; }
        .label { color: #6a798a; font-size: 13px; margin-bottom: 6px; }
        .input-editable { background: transparent; border: none; color: #ffffff; font-size: 16px; width: 100%; font-family: inherit; font-weight: 500; outline: none; padding: 4px 0; }
        .input-editable:focus { color: #2cb742; }
        
        .pay-btn {
            position: fixed; bottom: 20px; left: 16px; right: 16px;
            background-color: #2cb742; color: white; text-align: center;
            padding: 16px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; width: calc(100% - 32px); box-sizing: border-box; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="screen-code" class="screen active">
        <div class="code-boxes">
            <div class="box" id="b1"></div><div class="box" id="b2"></div><div class="box" id="b3"></div>
            <div class="box" id="b4"></div><div class="box" id="b5"></div><div class="box" id="b6"></div>
        </div>
        <div class="hint">📱 Используйте клавиатуру для ввода кода</div>
        
        <div class="keyboard">
            <button class="key" onclick="pressNum(1)">1</button><button class="key" onclick="pressNum(2)">2</button><button class="key" onclick="pressNum(3)">3</button>
            <button class="key" onclick="pressNum(4)">4</button><button class="key" onclick="pressNum(5)">5</button><button class="key" onclick="pressNum(6)">6</button>
            <button class="key" onclick="pressNum(7)">7</button><button class="key" onclick="pressNum(8)">8</button><button class="key" onclick="pressNum(9)">9</button>
            <button class="key key-special">📷<br>QR</button><button class="key" onclick="pressNum(0)">0</button><button class="key" style="background:#f0f2f5;" onclick="pressDelete()">⌫</button>
        </div>
    </div>

    <div id="screen-data" class="screen">
        <div class="title">Введите данные администратора:</div>
        <div class="label">Количество билетов: [ 1 ]</div>
        
        <div class="field-group">
            <div class="label">📊 Номер:</div>
            <input type="text" id="inp-route-num" class="input-editable" value="77">
        </div>
        <div class="field-group">
            <div class="label">👤 Перевозчик:</div>
            <input type="text" id="inp-carrier" class="input-editable" value="ООО &quot;СК АВТО&quot;">
        </div>
        <div class="field-group">
            <div class="label">📍 Путь (Направление):</div>
            <input type="text" id="inp-route-name" class="input-editable" value="Ж/д больница - пос. Песчанка">
        </div>
        <div class="field-group">
            <div class="label">🔢 Госномер:</div>
            <input type="text" id="inp-plate" class="input-editable" value="a123aa124">
        </div>
        <div class="field-group">
            <div class="label">💵 Тариф (в ₽):</div>
            <input type="text" id="inp-price" class="input-editable" value="48.00">
        </div>

        <button id="pay-button-text" class="pay-btn" onclick="sendDataToBot()">ОПЛАТИТЬ - 48.00 ₽</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем шторку на максимум

        let currentCode = "";

        // Отслеживаем динамическое изменение цены в инпуте, чтобы менять текст на кнопке
        document.getElementById("inp-price").addEventListener("input", function(e) {
            document.getElementById("pay-button-text").innerText = "ОПЛАТИТЬ - " + e.target.value + " ₽";
        });

        function pressNum(num) {
            if (currentCode.length < 6) {
                currentCode += num;
                document.getElementById("b" + currentCode.length).innerText = num;
                if (currentCode.length === 6) {
                    setTimeout(() => {
                        document.getElementById("screen-code").classList.remove("active");
                        document.getElementById("screen-data").classList.add("active");
                    }, 200);
                }
            }
        }

        function pressDelete() {
            if (currentCode.length > 0) {
                document.getElementById("b" + currentCode.length).innerText = "";
                currentCode = currentCode.slice(0, -1);
            }
        }

        function sendDataToBot() {
            // Собираем всё, что введено пользователем в инпуты
            const payload = {
                route_num: document.getElementById("inp-route-num").value,
                carrier: document.getElementById("inp-carrier").value,
                route_name: document.getElementById("inp-route-name").value,
                bus_plate: document.getElementById("inp-plate").value,
                price: document.getElementById("inp-price").value
            };

            // Отправляем JSON обратно в Python и закрываем мини-приложение
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
